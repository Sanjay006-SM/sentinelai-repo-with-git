name: CloudTrail Regression Tests

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'sentinel_backend/app/services/cloudtrail_parser.py'
      - 'sentinel_backend/app/services/ingestion.py'
      - 'sentinel_backend/app/services/ingestion_pipeline/**'
      - 'sentinel_backend/app/services/connectors/**'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'sentinel_backend/app/services/cloudtrail_parser.py'
      - 'sentinel_backend/app/services/ingestion.py'
      - 'sentinel_backend/app/services/ingestion_pipeline/**'
      - 'sentinel_backend/app/services/connectors/**'

jobs:
  test-cloudtrail-regression:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: sentinel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    defaults:
      run:
        working-directory: ./sentinel_backend

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio testcontainers[postgres]
        
    - name: Run CloudTrail Regression Suite
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/sentinel_test
      run: |
        pytest tests/test_cloudtrail_regression.py -v
