[pytest]
# Declares sentinel_backend/ as the pytest rootdir.
# This ensures conftest.py is discovered and sys.path is patched
# before any test module is imported, regardless of the CWD
# pytest is launched from (repo root, sentinel_backend/, or CI).
testpaths = sentinel_backend/tests sentinel_backend
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short tracebacks by default; CI can override with --tb=long
addopts = --tb=short -q
